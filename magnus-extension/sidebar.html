<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnus Sidebar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0b; --bg2: #111114; --bg3: #18181d; --bg4: #1e1e25;
    --border: rgba(255,255,255,0.06); --border-bright: rgba(255,255,255,0.12);
    --text: #f0f0f2; --muted: #6b6b78; --muted2: #4a4a55;
    --accent: #7c6aff; --accent2: #a594ff;
    --red: #ff4d6d; --amber: #ffb347; --green: #3dffa0; --blue: #4da6ff;
    --red-dim: rgba(255,77,109,0.12); --amber-dim: rgba(255,179,71,0.1);
    --green-dim: rgba(61,255,160,0.08); --accent-dim: rgba(124,106,255,0.12);
    --width: 340px;
  }
  body { width: var(--width); min-height: 100vh; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); overflow-x: hidden; }
  .sidebar { width: var(--width); height: 100vh; background: var(--bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .header { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); position: relative; z-index: 1; flex-shrink: 0; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 26px; height: 26px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 0 16px rgba(124,106,255,0.45), 0 0 36px rgba(124,106,255,0.22); animation: logo-glow 3.2s ease-in-out infinite; }
  @keyframes logo-glow { 0%, 100% { box-shadow: 0 0 16px rgba(124,106,255,0.45), 0 0 36px rgba(124,106,255,0.22); } 50% { box-shadow: 0 0 22px rgba(124,106,255,0.65), 0 0 48px rgba(124,106,255,0.35); } }
  .collapse-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--muted); font-size: 14px; line-height: 1; cursor: pointer; transition: all 0.15s ease; flex-shrink: 0; }
  .collapse-btn:hover { color: var(--text); border-color: var(--border-bright); background: var(--bg4); }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: -0.3px; color: var(--text); }
  .logo-text span { color: var(--accent2); }
  .status-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); } 50% { opacity: 0.5; box-shadow: 0 0 4px var(--green); } }
  .health-bar-wrap { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
  .health-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
  .health-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .health-score { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; color: var(--green); line-height: 1; }
  .health-score span { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; font-weight: 400; }
  .health-track { height: 3px; background: var(--bg4); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
  .health-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 99px; width: 0%; transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
  .health-reason { font-size: 10px; color: var(--muted); line-height: 1.4; }
  .tabs { display: flex; gap: 2px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; position: relative; z-index: 1; }
  .tab { flex: 1; padding: 5px 8px; border-radius: 6px; border: none; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s ease; text-align: center; }
  .tab.active { background: var(--bg3); color: var(--text); border: 1px solid var(--border-bright); }
  .tab-badge { display: inline-block; background: var(--red); color: #000; font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 99px; margin-left: 4px; vertical-align: middle; }
  .scroll-area { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; position: relative; z-index: 1; }
  .scroll-area::-webkit-scrollbar { width: 3px; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 99px; }
  .section-label { display: flex; align-items: center; gap: 6px; padding: 2px 0; margin-top: 4px; }
  .section-label-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .section-label-text { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
  .section-label-line { flex: 1; height: 1px; background: var(--border); }
  .cluster-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease, transform 0.18s ease; animation: card-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) both; }
  @keyframes card-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .cluster-card:hover { border-color: var(--border-bright); background: var(--bg3); box-shadow: 0 4px 20px rgba(0,0,0,0.35); transform: translateY(-1px); }
  .cluster-card.expanded { border-color: var(--border-bright); }
  .cluster-card.urgency-high { border-left: 2px solid var(--red); }
  .cluster-card.urgency-medium { border-left: 2px solid var(--amber); }
  .cluster-card.urgency-low { border-left: 2px solid var(--muted2); }
  .card-header { padding: 10px 12px; display: flex; align-items: flex-start; gap: 8px; }
  .card-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .card-icon.founder { background: rgba(61,255,160,0.1); }
  .card-icon.investor { background: rgba(77,166,255,0.1); }
  .card-icon.recruiter { background: rgba(255,179,71,0.1); }
  .card-icon.unknown { background: var(--bg4); }
  .card-icon.spam { background: rgba(255,77,109,0.1); }
  .card-main { flex: 1; min-width: 0; }
  .card-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 12px; color: var(--text); line-height: 1.3; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-oneliner { font-size: 11px; color: var(--muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-meta { display: flex; align-items: center; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
  .pill { display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 99px; font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.03em; }
  .pill-score { background: var(--accent-dim); color: var(--accent2); border: 1px solid rgba(124,106,255,0.2); }
  .pill-score.high { background: var(--red-dim); color: var(--red); border-color: rgba(255,77,109,0.2); }
  .pill-score.medium { background: var(--amber-dim); color: var(--amber); border-color: rgba(255,179,71,0.2); }
  .pill-type { background: var(--bg4); color: var(--muted); border: 1px solid var(--border); }
  .pill-founder { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,255,160,0.15); }
  .pill-investor { background: rgba(77,166,255,0.1); color: var(--blue); border: 1px solid rgba(77,166,255,0.2); }
  .pill-recruiter { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,179,71,0.2); }
  .score-number { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
  .score-number.high { color: var(--red); }
  .score-number.medium { color: var(--amber); }
  .score-number.low { color: var(--muted); }
  .card-body { max-height: 0; overflow: hidden; padding: 0 12px; opacity: 0; border-top: 1px solid transparent; transition: max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.28s ease, padding 0.35s ease, border-color 0.2s ease; }
  .cluster-card.expanded .card-body { max-height: 1400px; opacity: 1; padding: 0 12px 12px; border-top-color: var(--border); }
  .card-body-inner { padding-top: 10px; }
  .messages-preview { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .message-bubble { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px; font-size: 11px; color: var(--muted); line-height: 1.4; font-style: italic; }
  .opportunity-reason { font-size: 10px; color: var(--muted); background: var(--bg3); border-left: 2px solid var(--accent); padding: 6px 8px; border-radius: 0 6px 6px 0; margin-bottom: 10px; line-height: 1.4; }
  .reply-section { margin-top: 2px; }
  .reply-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .tone-tabs { display: flex; gap: 3px; margin-bottom: 8px; }
  .tone-btn { flex: 1; padding: 4px 6px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 9px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .tone-btn.active { background: var(--accent-dim); border-color: rgba(124,106,255,0.3); color: var(--accent2); }
  .reply-text { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; font-size: 11px; color: var(--text); line-height: 1.5; min-height: 52px; margin-bottom: 8px; }
  .action-row { display: flex; gap: 5px; }
  .btn { flex: 1; padding: 7px 8px; border-radius: 7px; border: none; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center; }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 0 12px rgba(124,106,255,0.3); }
  .btn-primary:hover { background: var(--accent2); box-shadow: 0 0 20px rgba(124,106,255,0.5); }
  .btn-ghost { background: var(--bg4); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border-bright); }
  .followup-hint { display: flex; align-items: flex-start; gap: 5px; margin-top: 8px; padding: 6px 8px; background: var(--amber-dim); border-radius: 6px; border: 1px solid rgba(255,179,71,0.15); }
  .followup-hint-icon { font-size: 10px; margin-top: 1px; flex-shrink: 0; }
  .followup-hint-text { font-size: 10px; color: var(--amber); line-height: 1.4; }
  .stale-card { background: var(--bg2); border: 1px solid var(--border); border-left: 2px solid var(--muted2); border-radius: 10px; padding: 10px 12px; animation: card-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .stale-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .stale-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 11px; color: var(--text); }
  .stale-days { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); }
  .stale-msg { font-size: 10px; color: var(--muted); font-style: italic; margin-bottom: 8px; line-height: 1.4; }
  .btn-revive { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid rgba(61,255,160,0.2); background: var(--green-dim); color: var(--green); font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; }
  .btn-revive:hover { background: rgba(61,255,160,0.15); box-shadow: 0 0 12px rgba(61,255,160,0.15); }
  .loading-state { display: flex; flex-direction: column; gap: 8px; padding: 12px; }
  .skeleton { background: var(--bg3); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; position: relative; }
  .skeleton::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%); animation: shimmer 1.5s ease-in-out infinite; }
  @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
  .skeleton-line { height: 10px; background: var(--bg4); border-radius: 4px; margin: 8px 12px; }
  .skeleton-line.short { width: 40%; }
  .skeleton-line.medium { width: 65%; }
  .skeleton-line.long { width: 85%; }
  .analyzing-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--accent-dim); border-bottom: 1px solid rgba(124,106,255,0.15); flex-shrink: 0; position: relative; z-index: 1; }
  .analyzing-dots { display: flex; gap: 3px; }
  .analyzing-dots span { width: 4px; height: 4px; background: var(--accent2); border-radius: 50%; animation: bounce-dot 1.2s ease-in-out infinite; }
  .analyzing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .analyzing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce-dot { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
  .analyzing-text { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent2); letter-spacing: 0.04em; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; text-align: center; gap: 8px; }
  .empty-icon { font-size: 28px; margin-bottom: 4px; }
  .empty-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; color: var(--text); }
  .empty-sub { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .error-banner { margin: 0 12px 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,77,109,0.35); background: var(--red-dim); flex-shrink: 0; }
  .error-banner-title { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--red); margin-bottom: 6px; }
  .error-banner-msg { font-size: 11px; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
  .error-retry { width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border-bright); background: var(--bg3); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .error-retry:hover { border-color: var(--accent); color: var(--accent2); }
  .sidebar-footer { flex-shrink: 0; padding: 10px 14px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; background: linear-gradient(180deg, transparent, rgba(0,0,0,0.25)); }
  .demo-toggle { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); cursor: pointer; user-select: none; font-family: 'DM Sans', sans-serif; }
  .demo-toggle input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
  .demo-hint { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted2); letter-spacing: 0.04em; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="analyzing-bar" id="analyzingBar">
    <div class="analyzing-dots"><span></span><span></span><span></span></div>
    <div class="analyzing-text">Scanning your inbox...</div>
  </div>
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">Mag<span>nus</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button type="button" class="collapse-btn" id="collapseBtn" title="Hide sidebar (⌃M / ⌘M)" aria-label="Collapse Magnus">⟨</button>
        <div class="status-dot"></div>
      </div>
    </div>
    <div class="health-bar-wrap">
      <div class="health-row">
        <div class="health-label">Inbox Health</div>
        <div class="health-score" id="healthScore">—<span>/100</span></div>
      </div>
      <div class="health-track"><div class="health-fill" id="healthFill"></div></div>
      <div class="health-reason" id="healthReason">Analyzing your DMs...</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('priority', this)">Priority <span class="tab-badge" id="priorityBadge">3</span></button>
    <button class="tab" onclick="switchTab('stale', this)">Stale <span class="tab-badge" id="staleBadge" style="background:var(--muted2)">2</span></button>
    <button class="tab" onclick="switchTab('all', this)">All</button>
  </div>
  <div class="error-banner" id="errorBanner" hidden>
    <div class="error-banner-title">Backend unreachable</div>
    <div class="error-banner-msg" id="errorBannerMsg">Could not reach the analyze API.</div>
    <button type="button" class="error-retry" id="errorRetryBtn">Retry</button>
  </div>
  <div class="scroll-area" id="scrollArea">
    <div class="loading-state" id="loadingState">
      <div class="skeleton" style="height:80px">
        <div class="skeleton-line long" style="margin-top:16px"></div>
        <div class="skeleton-line medium"></div>
        <div class="skeleton-line short"></div>
      </div>
      <div class="skeleton" style="height:72px">
        <div class="skeleton-line medium" style="margin-top:16px"></div>
        <div class="skeleton-line long"></div>
        <div class="skeleton-line short"></div>
      </div>
      <div class="skeleton" style="height:68px">
        <div class="skeleton-line long" style="margin-top:16px"></div>
        <div class="skeleton-line short"></div>
      </div>
    </div>
  </div>
  <div class="sidebar-footer">
    <label class="demo-toggle"><input type="checkbox" id="demoModeToggle" checked /> Demo mode</label>
    <span class="demo-hint">Sample inbox</span>
  </div>
</div>
<script src="sidebar.js"></script>
</body>
</html>
