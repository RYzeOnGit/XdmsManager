<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnus Sidebar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --bg2: #111114;
    --bg3: #18181d;
    --bg4: #1e1e25;
    --border: rgba(255,255,255,0.06);
    --border-bright: rgba(255,255,255,0.12);
    --text: #f0f0f2;
    --muted: #6b6b78;
    --muted2: #4a4a55;
    --accent: #7c6aff;
    --accent2: #a594ff;
    --red: #ff4d6d;
    --amber: #ffb347;
    --green: #3dffa0;
    --blue: #4da6ff;
    --cyan: #00e5ff;
    --red-dim: rgba(255,77,109,0.12);
    --amber-dim: rgba(255,179,71,0.1);
    --green-dim: rgba(61,255,160,0.08);
    --accent-dim: rgba(124,106,255,0.12);
    --width: 340px;
  }

  body {
    width: var(--width);
    min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Sidebar shell */
  .sidebar {
    width: var(--width);
    height: 100vh;
    background: var(--bg);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Subtle noise texture overlay */
  .sidebar::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  .header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 26px;
    height: 26px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    box-shadow: 0 0 16px rgba(124,106,255,0.4);
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo-text span {
    color: var(--accent2);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--green); }
    50% { opacity: 0.5; box-shadow: 0 0 4px var(--green); }
  }

  /* Health score bar */
  .health-bar-wrap {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
  }

  .health-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 7px;
  }

  .health-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .health-score {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--green);
    line-height: 1;
  }

  .health-score span {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-weight: 400;
  }

  .health-track {
    height: 3px;
    background: var(--bg4);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .health-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 99px;
    width: 0%;
    transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .health-reason {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.4;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .tab {
    flex: 1;
    padding: 5px 8px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }

  .tab.active {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border-bright);
  }

  .tab-badge {
    display: inline-block;
    background: var(--red);
    color: #000;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 99px;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* Scroll area */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  .scroll-area::-webkit-scrollbar { width: 3px; }
  .scroll-area::-webkit-scrollbar-track { background: transparent; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 99px; }

  /* Section label */
  .section-label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 0;
    margin-top: 4px;
  }

  .section-label-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section-label-text {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .section-label-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Cluster card */
  .cluster-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s ease;
    animation: card-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cluster-card:hover {
    border-color: var(--border-bright);
    background: var(--bg3);
  }

  .cluster-card.expanded {
    border-color: var(--border-bright);
  }

  .cluster-card.urgency-high { border-left: 2px solid var(--red); }
  .cluster-card.urgency-medium { border-left: 2px solid var(--amber); }
  .cluster-card.urgency-low { border-left: 2px solid var(--muted2); }

  .card-header {
    padding: 10px 12px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .card-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .card-icon.founder { background: rgba(61,255,160,0.1); }
  .card-icon.investor { background: rgba(77,166,255,0.1); }
  .card-icon.recruiter { background: rgba(255,179,71,0.1); }
  .card-icon.unknown { background: var(--bg4); }
  .card-icon.spam { background: rgba(255,77,109,0.1); }

  .card-main { flex: 1; min-width: 0; }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-oneliner {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  /* Pills */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 6px;
    border-radius: 99px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .pill-score {
    background: var(--accent-dim);
    color: var(--accent2);
    border: 1px solid rgba(124,106,255,0.2);
  }

  .pill-score.high { background: var(--red-dim); color: var(--red); border-color: rgba(255,77,109,0.2); }
  .pill-score.medium { background: var(--amber-dim); color: var(--amber); border-color: rgba(255,179,71,0.2); }

  .pill-type {
    background: var(--bg4);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .pill-founder { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,255,160,0.15); }
  .pill-investor { background: rgba(77,166,255,0.1); color: var(--blue); border: 1px solid rgba(77,166,255,0.2); }
  .pill-recruiter { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,179,71,0.2); }

  .score-number {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .score-number.high { color: var(--red); }
  .score-number.medium { color: var(--amber); }
  .score-number.low { color: var(--muted); }

  /* Expanded body */
  .card-body {
    display: none;
    padding: 0 12px 12px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }

  .cluster-card.expanded .card-body { display: block; }

  .card-body-inner { padding-top: 10px; }

  /* Messages preview */
  .messages-preview {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 10px;
  }

  .message-bubble {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 9px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
    font-style: italic;
  }

  .opportunity-reason {
    font-size: 10px;
    color: var(--muted);
    background: var(--bg3);
    border-left: 2px solid var(--accent);
    padding: 6px 8px;
    border-radius: 0 6px 6px 0;
    margin-bottom: 10px;
    line-height: 1.4;
  }

  /* Reply section */
  .reply-section { margin-top: 2px; }

  .reply-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .tone-tabs {
    display: flex;
    gap: 3px;
    margin-bottom: 8px;
  }

  .tone-btn {
    flex: 1;
    padding: 4px 6px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    letter-spacing: 0.04em;
  }

  .tone-btn.active {
    background: var(--accent-dim);
    border-color: rgba(124,106,255,0.3);
    color: var(--accent2);
  }

  .reply-text {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 10px;
    font-size: 11px;
    color: var(--text);
    line-height: 1.5;
    min-height: 52px;
    margin-bottom: 8px;
  }

  /* Action buttons */
  .action-row {
    display: flex;
    gap: 5px;
  }

  .btn {
    flex: 1;
    padding: 7px 8px;
    border-radius: 7px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 12px rgba(124,106,255,0.3);
  }

  .btn-primary:hover {
    background: var(--accent2);
    box-shadow: 0 0 20px rgba(124,106,255,0.5);
  }

  .btn-ghost {
    background: var(--bg4);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--border-bright); }

  /* Follow-up hint */
  .followup-hint {
    display: flex;
    align-items: flex-start;
    gap: 5px;
    margin-top: 8px;
    padding: 6px 8px;
    background: var(--amber-dim);
    border-radius: 6px;
    border: 1px solid rgba(255,179,71,0.15);
  }

  .followup-hint-icon { font-size: 10px; margin-top: 1px; flex-shrink: 0; }

  .followup-hint-text {
    font-size: 10px;
    color: var(--amber);
    line-height: 1.4;
  }

  /* Stale threads */
  .stale-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 2px solid var(--muted2);
    border-radius: 10px;
    padding: 10px 12px;
    animation: card-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .stale-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .stale-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 11px;
    color: var(--text);
  }

  .stale-days {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
  }

  .stale-msg {
    font-size: 10px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .btn-revive {
    width: 100%;
    padding: 6px;
    border-radius: 6px;
    border: 1px solid rgba(61,255,160,0.2);
    background: var(--green-dim);
    color: var(--green);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .btn-revive:hover {
    background: rgba(61,255,160,0.15);
    box-shadow: 0 0 12px rgba(61,255,160,0.15);
  }

  /* Loading state */
  .loading-state {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px;
  }

  .skeleton {
    background: var(--bg3);
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }

  .skeleton::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
    animation: shimmer 1.5s ease-in-out infinite;
  }

  @keyframes shimmer {
    from { transform: translateX(-100%); }
    to { transform: translateX(100%); }
  }

  .skeleton-line {
    height: 10px;
    background: var(--bg4);
    border-radius: 4px;
    margin: 8px 12px;
  }

  .skeleton-line.short { width: 40%; }
  .skeleton-line.medium { width: 65%; }
  .skeleton-line.long { width: 85%; }

  /* Analyzing indicator */
  .analyzing-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--accent-dim);
    border-bottom: 1px solid rgba(124,106,255,0.15);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .analyzing-dots {
    display: flex;
    gap: 3px;
  }

  .analyzing-dots span {
    width: 4px;
    height: 4px;
    background: var(--accent2);
    border-radius: 50%;
    animation: bounce-dot 1.2s ease-in-out infinite;
  }

  .analyzing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .analyzing-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce-dot {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .analyzing-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 0.04em;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
    gap: 8px;
  }

  .empty-icon { font-size: 28px; margin-bottom: 4px; }

  .empty-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
  }

  .empty-sub {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="sidebar">

  <!-- Analyzing bar -->
  <div class="analyzing-bar" id="analyzingBar">
    <div class="analyzing-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="analyzing-text">Scanning your inbox...</div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">Mag<span>nus</span></div>
      </div>
      <div class="status-dot"></div>
    </div>

    <!-- Health score -->
    <div class="health-bar-wrap">
      <div class="health-row">
        <div class="health-label">Inbox Health</div>
        <div class="health-score" id="healthScore">—<span>/100</span></div>
      </div>
      <div class="health-track">
        <div class="health-fill" id="healthFill"></div>
      </div>
      <div class="health-reason" id="healthReason">Analyzing your DMs...</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('priority', this)">Priority <span class="tab-badge" id="priorityBadge">3</span></button>
    <button class="tab" onclick="switchTab('stale', this)">Stale <span class="tab-badge" id="staleBadge" style="background:var(--muted2)">2</span></button>
    <button class="tab" onclick="switchTab('all', this)">All</button>
  </div>

  <!-- Content -->
  <div class="scroll-area" id="scrollArea">
    <!-- Loading skeletons -->
    <div class="loading-state" id="loadingState">
      <div class="skeleton" style="height:80px">
        <div class="skeleton-line long" style="margin-top:16px"></div>
        <div class="skeleton-line medium"></div>
        <div class="skeleton-line short"></div>
      </div>
      <div class="skeleton" style="height:72px">
        <div class="skeleton-line medium" style="margin-top:16px"></div>
        <div class="skeleton-line long"></div>
        <div class="skeleton-line short"></div>
      </div>
      <div class="skeleton" style="height:68px">
        <div class="skeleton-line long" style="margin-top:16px"></div>
        <div class="skeleton-line short"></div>
      </div>
    </div>
  </div>

</div>

<script>
const DEMO_DATA = {
  clusters: [
    {
      clusterTitle: "Partnership Pitch — B2B Payments",

      representativeMessages: [
        "Hey! I'm building a B2B payments tool and think there's a sick collab opp here. Would love to chat",

    },
    {

      intentType: "investor_sniff",
      senderType: "investor",
      opportunityScore: 90,
      opportunityReason: "Named fund, specific trigger (your tweet), and direct interest signal",
      urgency: "medium",
      urgencyTrigger: null,
      actionType: "reply_needed",
      representativeMessages: [
        "Hi, saw your tweet about AI tooling. I'm a partner at a seed fund and we're actively looking at this space"
      ],
      unreadCount: 1,
      daysSinceLastReply: null,
      suggestedReply: {
        warm: "Hey! Always great to connect with people exploring this space. What specifically caught your eye — happy to share what we're seeing too.",
        professional: "Thanks for reaching out. We'd be happy to share our perspective on the AI tooling landscape. Would a 20-min call work?",
        brief: "Hey! Happy to connect — what's your fund's thesis in this space?"
      },
      followUpSuggestion: "Schedule a call within 48 hours while interest is fresh",
      confidence: 0.95
    },
    {
      clusterTitle: "Intro Request — Vercel Team",
      oneLiner: "Asking for a warm intro with no context provided",
      intentType: "intro_request",
      senderType: "unknown",
      opportunityScore: 20,
      opportunityReason: "No mutual benefit or context — qualify before forwarding",
      urgency: "low",
      urgencyTrigger: null,
      actionType: "needs_intro",
      representativeMessages: [
        "Hey can you intro me to the Vercel team?"
      ],
      unreadCount: 1,
      daysSinceLastReply: null,
      suggestedReply: {
        warm: "Hey! Before I make the intro, can you share a bit about what you're building and why Vercel specifically? Want to make sure it's a good fit for both sides.",
        professional: "Happy to facilitate introductions where there's clear mutual value. Could you share more context on your project and what you're hoping to explore with Vercel?",
        brief: "Sure — but what's the context? What are you building?"
      },
      followUpSuggestion: null,
      confidence: 0.8
    },
    {
      clusterTitle: "Recruiter Spam",
      oneLiner: "Duplicate recruiting message — safe to ignore",
      intentType: "recruiting",
      senderType: "recruiter",
      opportunityScore: 10,
      opportunityReason: "Copy-paste outreach, sent twice, no personalization",
      urgency: "low",
      urgencyTrigger: null,
      actionType: "safe_to_ignore",
      representativeMessages: [
        "We're hiring senior engineers, think you'd be a great fit",
        "We're hiring senior engineers, think you'd be a great fit"
      ],
      unreadCount: 2,
      daysSinceLastReply: null,
      suggestedReply: {
        warm: "Thanks for thinking of me! Not looking right now but I'll keep you in mind.",
        professional: "Appreciate the outreach. I'm not actively seeking new opportunities at this time.",
        brief: "Not looking — thanks though."
      },
      followUpSuggestion: null,
      confidence: 0.85
    }
  ],
  inboxHealthScore: 70,
  inboxHealthReason: "2 hot leads need replies — investor and collab pitch going cold",
  staledThreads: [
    {
      name: "Priya @ Stripe",
      daysSince: 9,
      lastMessage: "Let me know if you're down to connect! No rush :)",
      revivalDraft: "Hey Priya! So sorry for going quiet — things got hectic. Would still love to connect, are you around this week?"
    },
    {
      name: "dev_marco",
      daysSince: 14,
      lastMessage: "Thought you might find this interesting — lmk what you think",
      revivalDraft: "Hey Marco! Just circling back — I actually did read what you sent and thought it was really interesting. Would love to chat more about it."
    }
  ]
};

let currentTab = 'priority';
let expandedCard = null;
let currentTones = {};

function senderIcon(type) {
  const map = { founder: '🟢', investor: '🔵', recruiter: '🟡', spam: '🔴', unknown: '⚪', friend: '🟣' };
  return map[type] || '⚪';
}

function senderPillClass(type) {
  const map = { founder: 'pill-founder', investor: 'pill-investor', recruiter: 'pill-recruiter' };
  return map[type] || 'pill-type';
}

function scoreClass(score) {
  if (score >= 70) return 'high';
  if (score >= 40) return 'medium';
  return 'low';
}

function intentLabel(type) {
  const map = {
    collab_pitch: 'Collab Pitch',
    investor_sniff: 'Investor',
    intro_request: 'Intro Req',
    recruiting: 'Recruiting',
    fan_message: 'Fan',
    friend_checkin: 'Friend',
    spam: 'Spam',
    customer: 'Customer'
  };
  return map[type] || type;
}

function renderClusterCard(cluster, index) {
  const sc = scoreClass(cluster.opportunityScore);
  const tone = currentTones[index] || 'warm';
  const reply = cluster.suggestedReply[tone];
  const isExpanded = expandedCard === index;

  return `
    <div class="cluster-card urgency-${cluster.urgency} ${isExpanded ? 'expanded' : ''}" 
         id="card-${index}" 
         onclick="toggleCard(${index}, event)">
      <div class="card-header">
        <div class="card-icon ${cluster.senderType}">
          ${senderIcon(cluster.senderType)}
        </div>
        <div class="card-main">
          <div class="card-title">${cluster.clusterTitle}</div>
          <div class="card-oneliner">${cluster.oneLiner}</div>
          <div class="card-meta">
            <span class="pill pill-score ${sc}">⚡ ${cluster.opportunityScore}</span>
            <span class="pill ${senderPillClass(cluster.senderType)}">${cluster.senderType}</span>
            <span class="pill pill-type">${intentLabel(cluster.intentType)}</span>
            ${cluster.unreadCount > 1 ? `<span class="pill pill-type">${cluster.unreadCount} msgs</span>` : ''}
          </div>
        </div>
        <div class="score-number ${sc}">${cluster.opportunityScore}</div>
      </div>

      <div class="card-body">
        <div class="card-body-inner">
          <div class="messages-preview">
            ${cluster.representativeMessages.slice(0,2).map(m => 
              `<div class="message-bubble">"${m}"</div>`
            ).join('')}
          </div>

          <div class="opportunity-reason">${cluster.opportunityReason}</div>

          <div class="reply-section">
            <div class="reply-label">Suggested reply</div>
            <div class="tone-tabs">
              <button class="tone-btn ${tone === 'warm' ? 'active' : ''}" onclick="setTone(${index}, 'warm', event)">Warm</button>
              <button class="tone-btn ${tone === 'professional' ? 'active' : ''}" onclick="setTone(${index}, 'professional', event)">Pro</button>
              <button class="tone-btn ${tone === 'brief' ? 'active' : ''}" onclick="setTone(${index}, 'brief', event)">Brief</button>
            </div>
            <div class="reply-text" id="reply-${index}">${reply}</div>
            <div class="action-row">
              <button class="btn btn-primary" onclick="injectReply(${index}, event)">Inject into DM</button>
              <button class="btn btn-ghost" onclick="dismissCard(${index}, event)">Dismiss</button>
            </div>
            ${cluster.followUpSuggestion ? `
              <div class="followup-hint">
                <div class="followup-hint-icon">💡</div>
                <div class="followup-hint-text">${cluster.followUpSuggestion}</div>
              </div>
            ` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderStaleCard(thread, index) {
  return `
    <div class="stale-card">
      <div class="stale-row">
        <div class="stale-name">${thread.name}</div>
        <div class="stale-days">${thread.daysSince}d ago</div>
      </div>
      <div class="stale-msg">"${thread.lastMessage}"</div>
      <button class="btn-revive" onclick="reviveThread(${index})">↩ Revive conversation</button>
    </div>
  `;
}

function renderPriorityView(data) {
  const high = data.clusters.filter(c => c.urgency === 'high');
  const medium = data.clusters.filter(c => c.urgency === 'medium');
  const low = data.clusters.filter(c => c.urgency === 'low');

  let html = '';

  if (high.length) {
    html += `<div class="section-label">
      <div class="section-label-dot" style="background:var(--red)"></div>
      <div class="section-label-text" style="color:var(--red)">Hot</div>
      <div class="section-label-line"></div>
    </div>`;
    html += high.map((c, i) => renderClusterCard(c, data.clusters.indexOf(c))).join('');
  }

  if (medium.length) {
    html += `<div class="section-label">
      <div class="section-label-dot" style="background:var(--amber)"></div>
      <div class="section-label-text" style="color:var(--amber)">Warm</div>
      <div class="section-label-line"></div>
    </div>`;
    html += medium.map((c) => renderClusterCard(c, data.clusters.indexOf(c))).join('');
  }

  if (low.length) {
    html += `<div class="section-label">
      <div class="section-label-dot" style="background:var(--muted2)"></div>
      <div class="section-label-text" style="color:var(--muted)">Low signal</div>
      <div class="section-label-line"></div>
    </div>`;
    html += low.map((c) => renderClusterCard(c, data.clusters.indexOf(c))).join('');
  }

  return html;
}

function renderStaleView(data) {
  if (!data.staledThreads || data.staledThreads.length === 0) {
    return `<div class="empty-state">
      <div class="empty-icon">✨</div>
      <div class="empty-title">All caught up</div>
      <div class="empty-sub">No stale threads — you're on top of your DMs.</div>
    </div>`;
  }
  return data.staledThreads.map((t, i) => renderStaleCard(t, i)).join('');
}

function renderAllView(data) {
  return data.clusters.map((c, i) => renderClusterCard(c, i)).join('');
}

function render(data) {
  const area = document.getElementById('scrollArea');
  let html = '';
  if (currentTab === 'priority') html = renderPriorityView(data);
  else if (currentTab === 'stale') html = renderStaleView(data);
  else html = renderAllView(data);
  area.innerHTML = html;
}

function toggleCard(index, e) {
  if (expandedCard === index) {
    expandedCard = null;
  } else {
    expandedCard = index;
  }
  render(DEMO_DATA);
}

function setTone(index, tone, e) {
  e.stopPropagation();
  currentTones[index] = tone;
  const replyEl = document.getElementById(`reply-${index}`);
  if (replyEl) {
    replyEl.style.opacity = '0.4';
    setTimeout(() => {
      replyEl.textContent = DEMO_DATA.clusters[index].suggestedReply[tone];
      replyEl.style.opacity = '1';
      replyEl.style.transition = 'opacity 0.2s';
    }, 150);
  }
  // update tone button states
  const card = document.getElementById(`card-${index}`);
  if (card) {
    card.querySelectorAll('.tone-btn').forEach(btn => btn.classList.remove('active'));
    e.target.classList.add('active');
  }
}

function injectReply(index, e) {
  e.stopPropagation();
  const tone = currentTones[index] || 'warm';
  const reply = DEMO_DATA.clusters[index].suggestedReply[tone];
  const btn = e.target;
  btn.textContent = '✓ Injected!';
  btn.style.background = 'var(--green)';
  btn.style.color = '#000';
  setTimeout(() => {
    btn.textContent = 'Inject into DM';
    btn.style.background = '';
    btn.style.color = '';
  }, 2000);
  // In real extension: find DM textarea and set value
  console.log('[Magnus] Injecting reply:', reply);
}

function dismissCard(index, e) {
  e.stopPropagation();
  const card = document.getElementById(`card-${index}`);
  if (card) {
    card.style.opacity = '0';
    card.style.transform = 'translateX(20px)';
    card.style.transition = 'all 0.2s ease';
    setTimeout(() => card.remove(), 200);
  }
}

function reviveThread(index) {
  const thread = DEMO_DATA.staledThreads[index];
  const btn = event.target;
  btn.textContent = '✓ Injected!';
  btn.style.background = 'rgba(61,255,160,0.2)';
  setTimeout(() => {
    btn.textContent = '↩ Revive conversation';
    btn.style.background = '';
  }, 2000);
  console.log('[Magnus] Reviving thread:', thread.revivalDraft);
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  expandedCard = null;
  render(DEMO_DATA);
}

// Boot sequence
function boot() {
  // After 1.8s, hide loading and show data
  setTimeout(() => {
    document.getElementById('loadingState').remove();
    document.getElementById('analyzingBar').style.display = 'none';

    // Animate health score
    const score = DEMO_DATA.inboxHealthScore;
    document.getElementById('healthScore').innerHTML = `${score}<span>/100</span>`;
    document.getElementById('healthReason').textContent = DEMO_DATA.inboxHealthReason;
    setTimeout(() => {
      document.getElementById('healthFill').style.width = score + '%';
    }, 100);

    // Update badges
    const hotCount = DEMO_DATA.clusters.filter(c => c.urgency !== 'low').length;
    document.getElementById('priorityBadge').textContent = hotCount;
    document.getElementById('staleBadge').textContent = DEMO_DATA.staledThreads.length;

    render(DEMO_DATA);
  }, 1800);
}

boot();
</script>

</html>
